<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copiar Data e Hora</title>
<link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <button id="btnCopy" class="btn btn-primary btn-block">ENCERRAMENTO</button>
    </div>
  </div>
</div>

<script>
document.getElementById("btnCopy").addEventListener("click", function() {
  var now = new Date();
  var formattedDate = formatDate(now);
  copyToClipboard("DATA/HORA DO ENCERRAMENTO: " + formattedDate);
});

function formatDate(date) {
  var day = String(date.getDate()).padStart(2, '0');
  var month = String(date.getMonth() + 1).padStart(2, '0');
  var year = date.getFullYear();
  var hours = String(date.getHours()).padStart(2, '0');
  var minutes = String(date.getMinutes()).padStart(2, '0');
  return `${day}/${month}/${year} ÀS ${hours}:${minutes}HRS`;
}

function copyToClipboard(text) {
  var textarea = document.createElement("textarea");
  textarea.value = text;
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand("copy");
  document.body.removeChild(textarea);
  alert("Data e hora copiadas para a área de transferência!");
}
</script>
<script type="module">
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js";
  import { app } from '/js/firebase-init.js';  // Importa o app para inicializar o auth
  
  const auth = getAuth(app);

  // Verifica se o usuário está autenticado
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      console.log("Usuário não autenticado, redirecionando...");
      window.location.href = "/login.html"; // Redireciona para a página de login
    } else {
      console.log("Usuário autenticado!", user);
      // Exibe o conteúdo após a verificação
      document.getElementById("main-content").style.display = "block";
    }
  });

  // Adiciona o evento de logout
  document.getElementById('logoutButton').addEventListener('click', () => {
    signOut(auth).then(() => {
      console.log("Usuário deslogado com sucesso!");
      window.location.href = "/login.html"; // Redireciona para a página de login após o logout
    }).catch((error) => {
      console.error("Erro ao deslogar: ", error);
    });
  });

  onAuthStateChanged(auth, (user) => {
        const emailSpan = document.getElementById("userEmail");
        if (user) {
          emailSpan.innerText = `Logado como: ${user.email}`;
        } else {
          emailSpan.innerText = `Usuário não autenticado`;
        }
      });

</script>

<script type="module" src="../js/firebase-init.js"></script>
</body>
</html>
