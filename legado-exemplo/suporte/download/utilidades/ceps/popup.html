<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de Endereço</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            width: 400px;
            min-height: 500px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #38af47;
        }

        .header h1 {
            color: #2d3748;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .header p {
            color: #718096;
            font-size: 12px;
        }

        .search-section {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #4a5568;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #38af47;
            box-shadow: 0 0 0 3px rgba(56, 175, 71, 0.1);
        }

        .button-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-primary {
            background: #38af47;
            color: white;
        }

        .btn-primary:hover {
            background: #2f9e3d;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }

        .btn-secondary:hover {
            background: #cbd5e0;
        }

        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #38af47;
            font-size: 12px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #e2e8f0;
            border-top: 2px solid #38af47;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-height: 300px;
            overflow-y: auto;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-warning {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #f59e0b;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }

        .table th {
            background: #f7fafc;
            padding: 8px;
            text-align: left;
            font-weight: 600;
            color: #4a5568;
            border-bottom: 2px solid #e2e8f0;
        }

        .table td {
            padding: 8px;
            border-bottom: 1px solid #e2e8f0;
            color: #2d3748;
        }

        .table tr:hover {
            background: #f7fafc;
        }

        .info-box {
            background: #ebf8ff;
            border: 1px solid #90cdf4;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            font-size: 11px;
            color: #2c5282;
        }

        .info-box a {
            color: #3182ce;
            text-decoration: underline;
        }

        .info-box a:hover {
            color: #2c5282;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 Pesquisa de Endereço</h1>
        <p>Uberlândia-MG</p>
    </div>

    <div class="info-box">
        <strong>ℹ️ Informação:</strong> Esta pesquisa está vinculada ao site dos 
        <a href="https://buscacepinter.correios.com.br/app/endereco/index.php" target="_blank">Correios</a>, 
        porém, com filtro apenas em Uberlândia-MG.
    </div>

    <div class="search-section">
        <div class="input-group">
            <label for="logradouro">📍 Digite o nome do logradouro:</label>
            <input type="text" id="logradouro" placeholder="Ex: 'eucaliptos'">
        </div>

        <div class="input-group">
            <label for="cepBusca">📮 Digite o CEP:</label>
            <input type="text" id="cepBusca" placeholder="Ex: 38400-000" maxlength="9">
        </div>

        <div class="button-group">
            <button id="btnBuscarLogradouro" class="btn btn-primary">
                🔍 Buscar por Logradouro
            </button>
            <button id="btnBuscarCEP" class="btn btn-primary">
                📮 Buscar por CEP
            </button>
            <button id="btnLimpar" class="btn btn-secondary">
                🗑️ Limpar
            </button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <span>Buscando...</span>
        </div>
    </div>

    <div class="results" id="resultado">
        <!-- Os resultados serão inseridos aqui -->
    </div>

    <script src="popup.js"></script>
</body>
</html>
