<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
    <div class="site-container">
        <header>
            <div class="d-flex justify-content-end">
                <button id="logoutButton" class="btn btn-danger btn-sm position-flex ">Sair</button>
              </div>
        
        </header>
    </div><br>
    <div class="container">
        <div class="form-header">
            <a href="/suporte/dashboard.html">
                <img class="logo" src="/mznet-logo.png" alt="MzNet Logo" width="90" height="40" style="margin-left: 1px;">
            </a>
            <div class="title">
                <h1>MUDANÇA DE ENDEREÇO</h1>
                <h3>BUSCAR EQUIPAMENTOS</h3>
            </div>
        </div>
        <div class="form">
            <div class="input-group">
                <div>
                    <a href="/suporte/dash-mudend.html"><button type="button">INICIO MUD END</button></a>
                </div>
                <div class="input-row">
                    <label for="cliente">Nome Completo:</label>
                    <input type="text" id="cliente" placeholder="Nome completo">
                </div>
                <div class="input-row">
                    <label for="canal">Canal:</label>
                    <select id="canal">
                        <option value="LIGAÇÃO">Telefone</option>
                        <option value="WHATSAPP">WhatsApp</option>
                    </select>
                </div>
                <div class="input-row">
                    <label for="contato">Contato:</label>
                    <input type="text" id="contato" placeholder="Somente os números">
                </div>
            </div>

            <div class="input-group">
                <div class="input-row">
                    <label for="sinalONU">Sinal ONU:</label>
                    <input type="text" id="sinalONU" placeholder="-19.20 DBM ou SEM SINAL">
                </div>
            </div> 
            <div class="input-group">
                <div class="input-row">
                    <span id="message"></span>
                    <label for="cep">CEP:</label>
                    <input type="text" id="cep" placeholder="Insira o CEP da rua">
                </div>
                <div class="input-row">
                    <label for="adress">Logradouro:</label>
                    <input type="text" id="adress" placeholder="Ex: Avenida dos Eucalipsos, 624">
                </div>
                <div class="input-row">
                    <label for="num">Nº:</label>
                    <input type="text" id="num" placeholder="Número">
                </div>
                <div class="input-row">
                    <label for="bairro">Bairro:</label>
                    <input type="text" id="bairro" placeholder="Insira o bairro do cliente">
                </div> 

                <div class="input-row">
                    <label for="complemento">Complemento (cond. bl, ap):</label>
                    <input type="text" id="complemento" placeholder="Casa frente, fundos, sobrado, cond. etc">
                </div> 
                <div class="input-row">
                    <label for="prumada">Sobrado | Prédio com/sem prumada:</label>
                    <select id="prumada">
                        <option value="**PRÉDIO COM PRUMADA**">Com prumada</option>
                        <option value="**PRÉDIO SEM PRUMADA - ENVIAR TÉCNICO DUPLADO**">Sem prumada (escolha 2 horários)</option>
                        <option value="**SOBRADO**">Sobrado</option>
                        <option value=" ">Casa ou Comércio</option>
                    </select>
                </div>
                <div class="input-row">
                    <label for="autorizado">Nome do Autorizado:</label>
                    <input type="text" id="autorizado" placeholder="Nome completo">
                </div>
                <div class="input-row">
                    <label for="parente">Grau parentesco:</label>
                    <input type="text" id="parente" placeholder="Mãe, Irmão, Esposa...">
                </div>
                <div class="input-row">
                    <label for="contatoAut">Contato do autorizado:</label>
                    <input type="text" id="contatoAut" placeholder="Somente números">
                </div>
               
            </div>
            <div class="input-row">
            <label for="dataVisita">Data da Visita Técnica:</label>
            <input type="text" id="dataVisita" placeholder="dd/mm/aaaa">
            </div>

            <div class="input-row">
            <label for="horaVisita">Hora:</label>
            <select id="horaVisita">
                <option value="">Selecione...</option>
                <option value="ÀS 08:00" class="font-weight-bold text-success">08:00</option>
                <option value="ÀS 08:30" class="font-weight-bold">08:30</option>
                <option value="ÀS 10:00" class="font-weight-bold text-success">10:00</option>
                <option value="ÀS 10:30" class="font-weight-bold">10:30</option><hr>
                <option value="ÀS 13:00" class="font-weight-bold text-success">13:00</option>
                <option value="ÀS 13:30" class="font-weight-bold">13:30</option>
                <option value="ÀS 15:00" class="font-weight-bold text-success">15:00</option>
                <option value="ÀS 15:30" class="font-weight-bold">15:30</option>
                <option value="ÀS 17:00" class="font-weight-bold text-danger">17:00 (somente com autorização)</option>
                <option value="APÓS ÀS 11:00" class="font-weight-bold text-primary">Após às 11:00 (aos sábados)</option>
</select>
            </div>
            <div class="input-row">
                <label for="formaPag">Forma de pagamento:</label>
                <select id="formaPag">
                    <option value="PIX">PIX</option>
                    <option value="DINHEIRO">DINHEIRO</option>
                    <option value="CARTAO">CARTAO</option>
                </select>
            </div>
            <div class="input-row">
                <label for="protocolo">Nº Protocolo:</label>
                <input type="text" id="protocolo" placeholder="123.456">
            </div>
            <div class="input-group">
                <div class="input-row">
                    <label for="logradouroAntigo">Antigo endereço (Rua e Nº):</label>
                    <input type="text" id="logradouroAntigo" placeholder="Insira o antigo endereço do cliente">
                </div>
                <div class="input-row">
                    <label for="bairroAntigo">Bairro:</label>
                    <input type="text" id="bairroAntigo" placeholder="Insira o antigo bairro do cliente">
                </div>
                <div class="input-group">
                    <div class="input-row">
                        <label for="onuOnt">ONU/ONT:</label>
                        <select id="onuOnt">
                            <option value="ONU = DATA // CONECTOR = VERDE.">ONU DATA</option>
                            <option value="ONU = ZTE // CONECTOR = VERDE.">ONU ZTE</option>
                            <option value="ONU = TENDA // CONECTOR = VERDE.">ONU TENDA</option>
                            <option value="ONU = SHORELINE // CONECTOR = AZUL.">ONU SHORELINE</option>
                            <option value="ONU = FIBERHOME // CONECTOR = AZUL.">ONU FIBERHOME</option>
                            <option value="ONT = ONT TP LINK 220 // CONECTOR = VERDE.">ONT TP LINK 220</option>
                            <option value="ONT = ONT TP LINK 230 // CONECTOR = VERDE.">ONT TP LINK 230</option>
                            <option value="ONT = ONT TP LINK 530 // CONECTOR = VERDE.">ONT TP LINK 530</option>                      
                            <option value="ONT = ONT ZTE // CONECTOR = AZUL.">ONT ZTE (azul)</option>
                            <option value="ONT = ONT ZTE // CONECTOR = VERDE.">ONT ZTE (verde)</option>
                        </select>
                    </div> 
                </div>    
            </div>
            <div class="input-row">
                <label for="operador">Nome do operador:</label>
                <select id="operador" required="true" requiredMessage="Informe o nome">
                    <option value="">Selecione...</option>
                    <option value="ANDREZA">ANDREZA</option>
                    <option value="BRUNA">BRUNA</option>
                    <option value="DEIVIT">DEIVIT</option>
                    <option value="EDUARDO">EDUARDO</option>
                    <option value="GABRIEL M.">GABRIEL MARTINS</option>
                    <option value="HALYSON">HALYSON</option>
                    <option value="HIAGO">HIAGO</option>
                    <option value="IZABELA">IZABELA</option>
                    <option value="KAROLAYNE">KAROLAYNE</option>
                    <option value="LAUREN">LAUREN</option>
                    <option value="LUIS">LUIS</option>
                    <option value="PEDRO">PEDRO</option>
                    <option value="RAMONY">RAMONY</option>
                    <option value="RENATA">RENATA</option>
                    <option value="RONALD">RONALD</option>
                    <option value="VICTOR H.">VICTOR HUGO</option>
                    <option value="VITOR M.">VITOR MANOEL</option>
                    <option value="VAGNER">VAGNER</option>
    </select>
            </div>
            <div class="buttons">
                <button onclick="gerarTextos()">Gerar textos</button>
                <button onclick="limparCampos()">Limpar</button>
            </div>
        </div>
    </div>

    <div class="output">
        <div class="output-group">
            <h2>Texto Protocolo:</h2>
            <textarea id="textoProtocolo" readonly></textarea>
            <button onclick="copiarTexto('textoProtocolo')">Copiar</button>
        </div>
    
        <div class="output-group">
            <h2>Texto O.S:</h2>
            <textarea id="textoOS" readonly></textarea>
            <button onclick="copiarTexto('textoOS')">Copiar</button>
        </div>
    
        <div class="output-group">
            <h2>Texto Agenda (PLANILHA):</h2>
            <textarea id="textoAgenda" readonly></textarea>
            <button onclick="copiarTexto('textoAgenda')">Copiar</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="script.js"></script>
    <script type="module">
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js";
        import { app } from '/js/firebase-init.js';  // Importa o app para inicializar o auth
        
        const auth = getAuth(app);
      
        // Verifica se o usuário está autenticado
        onAuthStateChanged(auth, (user) => {
          if (!user) {
            console.log("Usuário não autenticado, redirecionando...");
            window.location.href = "/login.html"; // Redireciona para a página de login
          } else {
            console.log("Usuário autenticado!", user);
            // Exibe o conteúdo após a verificação
            document.getElementById("main-content").style.display = "block";
          }
        });
      
        // Adiciona o evento de logout
        document.getElementById('logoutButton').addEventListener('click', () => {
          signOut(auth).then(() => {
            console.log("Usuário deslogado com sucesso!");
            window.location.href = "/login.html"; // Redireciona para a página de login após o logout
          }).catch((error) => {
            console.error("Erro ao deslogar: ", error);
          });
        });
      
        onAuthStateChanged(auth, (user) => {
              const emailSpan = document.getElementById("userEmail");
              if (user) {
                emailSpan.innerText = `Logado como: ${user.email}`;
              } else {
                emailSpan.innerText = `Usuário não autenticado`;
              }
            });
      
      </script>
      
      <script type="module" src="../js/firebase-init.js"></script>
</body>
</html>
