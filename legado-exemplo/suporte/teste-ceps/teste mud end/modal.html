<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site</title>
    <style>
        /* Estilos para o modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.5);
        }

        /* Estilos para o conteúdo do modal */
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
        }

        /* Estilos para o botão de fechar */
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }

        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button id="openModal">Abrir Modal</button>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de Endereço</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 20px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2 class="mt-4">Pesquisa de Endereços</h2>
        <div class="form-group mt-4">
            <label for="logradouro">Digite o nome do logradouro:</label>
            <input type="text" class="form-control" style="border-radius: 18px;" id="logradouro" placeholder="Exemplo: 'eucaliptos'">
        </div>
        <button type="button" class="btn btn-success mr-2" style="border-radius: 18px;" onclick="buscarEndereco()">Pesquisar</button>
        <button type="button" class="btn btn-secondary" style="border-radius: 18px;" onclick="limparCampos()">Limpar</button>

        <div id="resultado" class="mt-4"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        function buscarEndereco() {
            var logradouro = document.getElementById("logradouro").value;
            var url = "https://viacep.com.br/ws/MG/Uberlandia/" + logradouro + "/json/";
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    mostrarResultado(data);
                })
                .catch(error => {
                    console.error('Erro ao buscar endereço:', error);
                });
        }

        function mostrarResultado(enderecos) {
            var resultadoDiv = document.getElementById("resultado");
            resultadoDiv.innerHTML = "";
            if (enderecos.length === 0) {
                resultadoDiv.innerHTML = "<p>Nenhum endereço encontrado para o logradouro informado.</p>";
                return;
            }
            var tableHtml = "<table class='table'><thead><tr><th>CEP</th><th>Bairro</th><th>Logradouro</th></tr></thead><tbody>";
            enderecos.forEach(function(endereco) {
                tableHtml += "<tr><td>" + endereco.cep + "</td><td>" + endereco.bairro + "</td><td>" + endereco.logradouro + "</td></tr>";
            });
            tableHtml += "</tbody></table>";
            resultadoDiv.innerHTML = tableHtml;
        }

        function limparCampos() {
            document.getElementById("logradouro").value = "";
            document.getElementById("resultado").innerHTML = "";
        }
    </script>
</body>

</html>

        </div>
    </div>

    <script>
        // Obtém o modal
        var modal = document.getElementById("myModal");

        // Obtém o botão que abre o modal
        var btn = document.getElementById("openModal");

        // Obtém o elemento <span> que fecha o modal
        var span = document.getElementsByClassName("close")[0];

        // Quando o usuário clicar no botão, abre o modal
        btn.onclick = function() {
            modal.style.display = "block";
        }

        // Quando o usuário clicar no <span> (x), fecha o modal
        span.onclick = function() {
            modal.style.display = "none";
        }

        // Quando o usuário clicar fora do modal, ele também será fechado
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>
</body>
</html>
