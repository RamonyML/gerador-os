// VALIDAÇÃO DOS CAMPOS EM BRANCO
document.addEventListener("DOMContentLoaded", function() {
    var form = document.querySelector('form');
    var inputs = form.querySelectorAll('input, select');
    var submitButton = form.querySelector('button[type="submit"]');

    // Função para validar e aplicar classes
    function validateFields() {
        var allFilled = true;
        inputs.forEach(function(input) {
            if (input.value.trim() === "") {
                input.classList.remove('primary', 'success');
                input.classList.add('danger');
                allFilled = false;
            } else {
                input.classList.remove('danger', 'success');
                input.classList.add('primary');
            }
        });
        return allFilled;
    }

    // Valida e aplica classes ao modificar os campos
    inputs.forEach(function(input) {
        input.addEventListener('input', function() {
            validateFields();
        });
    });

    // Altera classes ao enviar o formulário
    form.addEventListener('submit', function(event) {
        event.preventDefault();
        if (validateFields()) {
            inputs.forEach(function(input) {
                input.classList.remove('danger', 'primary');
                input.classList.add('success');
            });
            // Aqui você pode adicionar a lógica para gerar os textos
            gerarTextos();
        } else {
            // Continua validando campos individuais
            validateFields();
        }
    });
});

    var form = document.querySelector('form');

        input.value = "";

    });
}

var menuContainer = document.querySelector('.menu ul');

    menuContainer.addEventListener('click', function (event) {
        var clickedItem = event.target.closest('.has-submenu');

        // Feche todos os submenus
        document.querySelectorAll('.has-submenu .submenu').forEach(function (submenu) {
            if (submenu !== clickedItem.querySelector('.submenu')) {
                submenu.classList.remove('active');
            }
        });

        // Toggle class 'active' apenas no submenu clicado
        if (clickedItem) {
            clickedItem.querySelector('.submenu').classList.toggle('active');
        }
    });

    // Adicione um ouvinte de eventos para fechar o submenu ao clicar fora
    document.addEventListener('click', function (event) {
        if (!event.target.closest('.has-submenu')) {
            // Feche todos os submenus
            document.querySelectorAll('.has-submenu .submenu').forEach(function (submenu) {
                submenu.classList.remove('active');
            });
        }
    });

    function gerarTextos() {
    let cliente = document.getElementById('cliente').value.toUpperCase();
    let canal = document.getElementById('canal').value;
    let contato = document.getElementById('contato').value.replace(/\D/g, '');
    let planoEscolhido = document.querySelector('input[name="planoInternet"]:checked');
    let planoDetalhes = '';
    
    if (planoEscolhido) {
        let selectPlano = document.querySelector(`#selectContainer select`);
        planoDetalhes = selectPlano ? selectPlano.value : '';
    }
    
    let vencimento = document.getElementById('vencimento').value;
    let dataVisita = document.getElementById('dataVisita').value;
    let horaVisita = document.getElementById('horaVisita').value;
    
    // Verificação se todos os campos estão preenchidos
    if (!cliente || !canal || !planoEscolhido || !planoDetalhes || !vencimento || !dataVisita || !horaVisita) {
        alert("Por favor, preencha todos os campos.");
        return;
    }
    
    // Geração do texto, agora usando planoDetalhes
    let texto = `${cliente.split(' ')[0]} SOLICITOU ${canal}${contato} A INSTALAÇÃO DE INTERNET PARA O ENDEREÇO CITADO NA O.S, PLANO DE ACESSO: ${planoDetalhes}; VENCIMENTO: DIA ${vencimento} DO MÊS; VIGÊNCIA DO CONTRATO: 12 MESES. INSTALAÇÃO AGENDADA PARA ${dataVisita} ${horaVisita}. ${cliente.split(' ')[0]} ACOMPANHARÁ INSTALAÇÃO.`;
    
    // Exibindo o texto gerado no textarea
    document.getElementById('textoProtocolo').value = texto;
}

function copiarTexto(elementId) {
    // Obtenha o elemento de texto a ser copiado
    const texto = document.getElementById(elementId);

    // Selecione o texto no campo de texto
    texto.select();
    document.execCommand('copy');
}


function limparCampos() {
    // Limpe os campos de entrada
    const camposEntrada = document.querySelectorAll('input, select');
    camposEntrada.forEach(campo => {
        campo.value = '';
    });

    // Limpe os campos de saída
    const textos = document.querySelectorAll('.output textarea');
    textos.forEach(texto => {
        texto.value = '';
    });
}

    document.addEventListener('DOMContentLoaded', function () {
        flatpickr("#dataVisita", {
            dateFormat: "d/m/Y",
            locale: "pt",
            onChange: function(selectedDates, dateStr, instance) {
                const date = new Date(dateStr.split('/').reverse().join('-'));
                const day = date.getDay();
                const horaVisita = document.getElementById('horaVisita');
    
                if (day === 5) { // Sábado
                    horaVisita.innerHTML = `
                        <option value="ÀS 08:30 HORAS">08:30</option>
                        <option value="ÀS 10:30 HORAS">10:30</option>
                        <option value="ÀS 11:30 HORAS">11:30</option>
                        <option value="ÀS 12:30 HORAS">Após 12:30</option>
                        <option value="NO PERÍODO DA MANHÃ">No período da manhã</option>
                        <option value="NO PERÍODO DA TARDE">No período da manhã</option>

                    `;
                    horaVisita.disabled = false;
                } else if (day === 6) { // Domingo
                    horaVisita.innerHTML = '';
                    horaVisita.disabled = true;
                } else {
                    horaVisita.innerHTML = `
                        <option value="ÀS 08:30 HORAS">08:30</option>
                        <option value="ÀS 10:30 HORAS">10:30</option>
                        <option value="ÀS 13:30 HORAS">13:30</option>
                        <option value="ÀS 15:30 HORAS">15:30</option>
                        <option value="ÀS 16:30 HORAS">16:30</option>
                        <option value="NO PERÍODO DA MANHÃ">No período da manhã</option>
                        <option value="NO PERÍODO DA TARDE">No período da manhã</option>

                    `;
                    horaVisita.disabled = false;
                }
            }
        });
    });
</script>
