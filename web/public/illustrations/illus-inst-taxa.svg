<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320">
  <!-- Background ring -->
  <circle cx="188" cy="200" r="140" fill="#38af47" opacity="0.05"/>
  <circle cx="188" cy="200" r="98" fill="#38af47" opacity="0.05"/>

  <!-- WiFi signal arcs -->
  <path d="M148 155 Q188 119 228 155" stroke="#38af47" stroke-width="5.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M120 129 Q188 87 256 129" stroke="#38af47" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M92 103 Q188 55 284 103" stroke="#38af47" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.32"/>
  <!-- Dot -->
  <circle cx="188" cy="169" r="8" fill="#2e7d32"/>

  <!-- Router body -->
  <rect x="120" y="177" width="136" height="72" rx="14" fill="#2e7d32"/>
  <rect x="130" y="186" width="116" height="22" rx="7" fill="#196e2e" opacity="0.45"/>
  <!-- LEDs -->
  <circle cx="158" cy="219" r="5.5" fill="#38af47"/>
  <circle cx="178" cy="219" r="5.5" fill="#38af47" opacity="0.55"/>
  <circle cx="198" cy="219" r="5.5" fill="#38af47" opacity="0.28"/>
  <rect x="130" y="231" width="116" height="11" rx="4" fill="#196e2e" opacity="0.3"/>
  <!-- Antennas -->
  <rect x="140" y="155" width="7" height="30" rx="3.5" fill="#196e2e"/>
  <rect x="229" y="155" width="7" height="30" rx="3.5" fill="#196e2e"/>

  <!-- Credit card (upper-right) -->
  <rect x="272" y="88" width="96" height="62" rx="9" fill="#D97706"/>
  <!-- Card shine highlight -->
  <rect x="272" y="88" width="96" height="22" rx="9" fill="#F59E0B" opacity="0.5"/>
  <rect x="272" y="99" width="96" height="11" fill="#F59E0B" opacity="0.5"/>
  <!-- Card stripe -->
  <rect x="272" y="112" width="96" height="16" fill="#92400E" opacity="0.55"/>
  <!-- Chip -->
  <rect x="282" y="96" width="22" height="18" rx="3" fill="#FDE68A"/>
  <line x1="282" y1="105" x2="304" y2="105" stroke="#92400E" stroke-width="1" opacity="0.5"/>
  <line x1="293" y1="96" x2="293" y2="114" stroke="#92400E" stroke-width="1" opacity="0.5"/>
  <!-- Card number dots -->
  <circle cx="290" cy="140" r="3" fill="#FDE68A" opacity="0.8"/>
  <circle cx="302" cy="140" r="3" fill="#FDE68A" opacity="0.8"/>
  <circle cx="314" cy="140" r="3" fill="#FDE68A" opacity="0.8"/>
  <circle cx="326" cy="140" r="3" fill="#FDE68A" opacity="0.8"/>
  <!-- Card wifi icon (contactless) -->
  <path d="M348 130 Q355 123 362 130" stroke="#FDE68A" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M344 126 Q355 117 366 126" stroke="#FDE68A" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.45"/>
  <circle cx="355" cy="133" r="2" fill="#FDE68A" opacity="0.7"/>

  <!-- Router shadow -->
  <ellipse cx="188" cy="253" rx="74" ry="9" fill="#2e7d32" opacity="0.14"/>

  <!-- Floating dots -->
  <circle cx="68" cy="200" r="7" fill="#38af47" opacity="0.1"/>
  <circle cx="56" cy="220" r="5" fill="#38af47" opacity="0.07"/>
  <circle cx="360" cy="228" r="6" fill="#38af47" opacity="0.09"/>
</svg>
