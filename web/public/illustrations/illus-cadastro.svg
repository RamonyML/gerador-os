<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320">
  <!-- Background circles (decorative) -->
  <circle cx="48" cy="265" r="72" fill="#38af47" opacity="0.06"/>
  <circle cx="375" cy="58" r="52" fill="#2e7d32" opacity="0.07"/>

  <!-- Desk surface -->
  <rect x="38" y="218" width="324" height="13" rx="6.5" fill="#2e7d32"/>
  <!-- Desk legs -->
  <rect x="58" y="230" width="16" height="72" rx="4" fill="#196e2e"/>
  <rect x="326" y="230" width="16" height="72" rx="4" fill="#196e2e"/>

  <!-- Laptop screen -->
  <rect x="156" y="97" width="132" height="92" rx="8" fill="#1b5e20"/>
  <rect x="164" y="105" width="116" height="76" rx="5" fill="#0a3d10"/>
  <!-- Screen content: form UI -->
  <rect x="173" y="114" width="56" height="9" rx="4.5" fill="#38af47" opacity="0.95"/>
  <rect x="173" y="127" width="97" height="4" rx="2" fill="#38af47" opacity="0.38"/>
  <rect x="173" y="135" width="87" height="4" rx="2" fill="#38af47" opacity="0.38"/>
  <rect x="173" y="143" width="92" height="4" rx="2" fill="#38af47" opacity="0.38"/>
  <rect x="173" y="154" width="40" height="14" rx="7" fill="#38af47"/>

  <!-- Laptop base -->
  <rect x="149" y="188" width="146" height="32" rx="7" fill="#1b5e20"/>
  <rect x="157" y="194" width="130" height="20" rx="4" fill="#2e7d32" opacity="0.45"/>
  <rect x="207" y="196" width="30" height="15" rx="3" fill="#196e2e" opacity="0.65"/>
  <!-- Hinge -->
  <rect x="164" y="186" width="116" height="4" rx="2" fill="#196e2e"/>

  <!-- Person sitting -->
  <!-- Chair back (subtle) -->
  <rect x="72" y="157" width="10" height="72" rx="5" fill="#38af47" opacity="0.22"/>
  <rect x="50" y="147" width="54" height="13" rx="6.5" fill="#38af47" opacity="0.18"/>

  <!-- Person body -->
  <rect x="66" y="182" width="54" height="46" rx="14" fill="#38af47"/>

  <!-- Head -->
  <circle cx="93" cy="157" r="25" fill="#FBBF7A"/>
  <!-- Hair -->
  <path d="M68 150 C68 132 93 127 93 127 C93 127 118 132 118 150 L113 147 C100 138 86 138 73 147 Z" fill="#4A2C0A"/>
  <!-- Eyes -->
  <circle cx="86" cy="155" r="2.5" fill="#2C1A0A"/>
  <circle cx="100" cy="155" r="2.5" fill="#2C1A0A"/>
  <!-- Smile -->
  <path d="M86 164 Q93 169 100 164" stroke="#2C1A0A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="85" y="180" width="16" height="10" rx="4" fill="#FBBF7A"/>

  <!-- Left arm reaching toward laptop -->
  <path d="M66 197 Q44 212 47 222 Q102 220 155 216" stroke="#FBBF7A" stroke-width="13" stroke-linecap="round" fill="none"/>
  <!-- Right arm -->
  <path d="M120 194 Q145 207 153 213" stroke="#FBBF7A" stroke-width="13" stroke-linecap="round" fill="none"/>

  <!-- Clipboard (right of desk) -->
  <rect x="322" y="166" width="46" height="60" rx="5" fill="#ffffff" stroke="#E2E8F0" stroke-width="1.5"/>
  <!-- Clipboard clip -->
  <rect x="335" y="160" width="20" height="13" rx="4" fill="#38af47"/>
  <!-- Form lines -->
  <rect x="329" y="182" width="32" height="3.5" rx="1.75" fill="#CBD5E1"/>
  <rect x="329" y="190" width="32" height="3.5" rx="1.75" fill="#CBD5E1"/>
  <rect x="329" y="198" width="24" height="3.5" rx="1.75" fill="#CBD5E1"/>
  <rect x="329" y="206" width="32" height="3.5" rx="1.75" fill="#CBD5E1"/>
  <!-- Check badge -->
  <circle cx="345" cy="220" r="10" fill="#38af47" opacity="0.16"/>
  <path d="M340 220 L344 224 L352 213" stroke="#2e7d32" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pencil on desk -->
  <rect x="270" y="207" width="40" height="7" rx="3.5" fill="#F59E0B" transform="rotate(-12 270 207)"/>
  <path d="M305 203 L311 201 L308 207 Z" fill="#2C1A0A" transform="rotate(-12 308 204)"/>

  <!-- Decorative dots -->
  <circle cx="36" cy="158" r="5.5" fill="#38af47" opacity="0.16"/>
  <circle cx="26" cy="178" r="3.5" fill="#38af47" opacity="0.11"/>
  <circle cx="385" cy="200" r="6" fill="#38af47" opacity="0.09"/>
</svg>
